# ==============================================================================
# DGX SPARK / GRACE-BLACKWELL AI ORCHESTRATION STACK (sparkyard)
#
# Parameterized by:
#   .env         — generated, NON-secret compose vars (LLM_ROOT_PATH,
#                  REPO_CONFIG_PATH). Produced by `make render`.
#   secrets.env  — gitignored; the single secret store. `make secrets` projects
#                  least-privilege subsets (secrets.db.env / secrets.litellm.env /
#                  secrets.webui.env) that each service reads via `env_file:`.
# Model lists in the inference services are generated from models.yaml — do not
# hand-edit llama-swap/config.yaml or LiteLLM/config.yaml.
#
# First run:
#   make init               # seed settings.local.yaml + models.yaml + secrets.env
#   # edit settings.local.yaml (paths) + models.yaml + secrets.env (HF_TOKEN)
#   make render             # generate .env + llama-swap/LiteLLM configs
#   make build              # build the local llama-cpp + llama-swap images
#   docker compose up -d
# ==============================================================================


services:

  # ==========================================
  # 1. LLAMA-SERVER (Persistent GGUF Engine)
  # ==========================================
  # Persistent llama.cpp instance for GGUF models; stays loaded between requests.
  # llama-swap can also spin *ephemeral* llama.cpp containers on demand — use
  # this block for a model you always want hot (e.g. a fast chat fallback).
  llama-server:
    build:
      context: ./llama-cpp
      dockerfile: llama-cpp.Dockerfile
    image: sparkyard/llama-cpp-spark:latest
    container_name: llama.cpp
    restart: unless-stopped
    ipc: host                          # Required for shared memory with GPU driver
    security_opt:
      - seccomp:unconfined             # Allows low-level CUDA calls
    ulimits:
      memlock: -1                      # Unlimited locked memory — needed for unified VRAM
      stack: 67108864
    ports:
      - "127.0.0.1:19000:19000"
    volumes:
      - ${LLM_ROOT_PATH}/ollama:/models/ollama
      # Mount individual GGUF files if you only want specific models:
      # - ${LLM_ROOT_PATH}/ollama/YourModel/model-Q4_K_M.gguf:/models/model-Q4_K_M.gguf
      # Multi-file GGUF shards (e.g. large 106B models split into two files):
      # - ${LLM_ROOT_PATH}/ollama/BigModel/model-Q4_K_M-00001-of-00002.gguf:/models/model-00001-of-00002.gguf
      # - ${LLM_ROOT_PATH}/ollama/BigModel/model-Q4_K_M-00002-of-00002.gguf:/models/model-00002-of-00002.gguf
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: all, capabilities: [gpu]}]
    environment:
      - GGML_CUDA_ENABLE_UNIFIED_MEMORY=1  # Required for Grace-Blackwell unified memory
    command:
      - --host
      - "0.0.0.0"
      - --port
      - "19000"
      - --parallel
      - "4"          # Simultaneous request slots
      - --no-mmap    # Disable memory-mapped I/O (required for unified memory on GB10)
      - --context-shift
      - --models-dir
      - /models
      - --chat-template
      - chatml
      - --n-gpu-layers
      - "99"         # Offload all layers to GPU
      - --models-max
      - "1"          # Keep only one model loaded at a time
      - --ctx-size
      - "16384"      # Context window in tokens
      - --timeout
      - "600"        # Request timeout in seconds
    stdin_open: true
    tty: true


  # ==========================================
  # 2. LLAMA-SWAP (The VRAM Manager)
  # ==========================================
  # Orchestrates all inference containers: spawns them on demand via docker.sock,
  # evicts them when idle so 128 GB unified memory is never wasted.
  # LiteLLM routes to it via Docker DNS: http://llama-swap:8080
  # Spawned model containers join its network namespace
  # (--network container:llama-swap) so they are reachable as localhost:PORT
  # inside llama-swap, even though they run in separate containers.
  llama-swap:
    build:
      context: ./llama-swap
      dockerfile: llama-swap.Dockerfile
    image: sparkyard/llama-swap-spark:latest
    container_name: llama-swap
    restart: unless-stopped
    ports:
      - "127.0.0.1:28080:8080"  # Host 28080 → container 8080 (avoid conflict with other services)
    entrypoint: ["/usr/bin/llama-swap", "-config", "/app/config.yaml", "-listen", "0.0.0.0:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ${REPO_CONFIG_PATH}/llama-swap:/app        # llama-swap config directory
      # SECURITY: mounting the host Docker socket gives llama-swap root-equivalent
      # control of the host — the stack's biggest trust boundary, and the reason
      # :28080 is bound to 127.0.0.1 only (see README "Security").
      - /var/run/docker.sock:/var/run/docker.sock  # Required to spawn/evict model containers
    # - /usr/bin/docker:/usr/bin/docker             # Uncomment if docker CLI is not bundled in the image
      - ${LLM_ROOT_PATH}:/models                   # Model files — used by mod-script models
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: all, capabilities: [gpu]}]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LLM_ROOT_PATH=${LLM_ROOT_PATH}  # Passed to launch scripts for volume mount fallback


  # ==========================================
  # 3. OLLAMA (GGUF via Ollama modelfile format)
  # ==========================================
  # Handles models pulled or defined via Ollama's modelfile system.
  # The 15-second startup delay gives the GPU driver time to settle
  # before Ollama tries to claim VRAM — avoids init-time OOM on GB10.
  ollama:
    image: ollama/ollama@sha256:05b6fe5143ed006d6d4abd39bdd575f962a5822bdf81e6fbb5e6894eb984ab9c
    container_name: ollama
    restart: unless-stopped
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ${LLM_ROOT_PATH}/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices: [{driver: nvidia, count: all, capabilities: [gpu]}]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_HOST=0.0.0.0          # Listen on all interfaces inside the container
      - OLLAMA_FLASH_ATTENTION=1     # Enable flash attention — significant speedup on GB10
      - OLLAMA_NUM_PARALLEL=1        # Concurrent request slots (keep 1 for large models)
      - OLLAMA_LLM_LIBRARY=cuda_v13  # Force CUDA 13 backend for Blackwell SM121
      - OLLAMA_DEBUG=0               # Verbose logging off; set to 1 to debug
    entrypoint: ["/bin/sh", "-c", "sleep 15 && ollama serve"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


  # ==========================================
  # 4. LITELLM (The Unified API Gateway)
  # ==========================================
  # Single OpenAI-compatible endpoint (:14000) in front of all inference services.
  # Internal port is 4000; mapped to 14000 externally to avoid the DGX
  # NoMachine port conflict on 4000.
  # Auth is ON: every API call must present the LITELLM_MASTER_KEY (sk-*).
  litellm:
    image: docker.litellm.ai/berriai/litellm-database:main-stable@sha256:8402d2372a7ba8641cf09d8fa47006088d0705979b4e87c4eb2aec58fb298ce8
    container_name: litellm
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "14000:4000"  # External 14000 → internal 4000 (avoids NoMachine conflict)
    # Least-privilege secrets: only the keys litellm actually needs
    # (LITELLM_MASTER_KEY, LITELLM_UI_USERNAME, LITELLM_UI_PASSWORD, DATABASE_URL).
    # HF_TOKEN / REGISTRY_TOKEN never enter this container.
    env_file:
      - secrets.litellm.env
    volumes:
      - ${REPO_CONFIG_PATH}/LiteLLM/config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health/readiness\")'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"   # Keep this at 4000 internally (mapped to 14000 externally)


  # ==========================================
  # 5. LITELLM DATABASE (PostgreSQL)
  # ==========================================
  # Stores LiteLLM's virtual keys, usage logs, and team/budget data.
  # Exposed on 15432 to avoid conflict with any host Postgres on 5432.
  litellm-db:
    image: postgres:15-alpine@sha256:df7bca0066e6f60cc3dd32faa70caddec20e2c22b58932f79498e5704b23854a
    container_name: litellm-postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    env_file:
      - secrets.db.env   # provides POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD only
    volumes:
      - litellm_db_data:/var/lib/postgresql/data


  # ==========================================
  # 6. OPEN WEBUI (Browser chat UI)
  # ==========================================
  # Browser chat over the LiteLLM gateway. Own login (first signup = admin).
  # Reads OPENAI_API_KEY + WEBUI_SECRET_KEY from secrets.webui.env (least-privilege).
  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:7f1b0a1a50cfbac23da3b16f96bc968fd757b26dc9e54e93813d61768ea9184e  # pinned 2026-06-14
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    ports:
      - "3000:8080"
    env_file:
      - secrets.webui.env
    environment:
      - OPENAI_API_BASE_URL=http://litellm:4000/v1
      - WEBUI_AUTH=true
    volumes:
      - open-webui:/app/backend/data


# ==========================================
# GLOBAL VOLUMES
# ==========================================
volumes:
  litellm_db_data:  # Persistent Postgres data for LiteLLM (keys, usage logs, budgets)
  open-webui:       # Open WebUI accounts, chats, settings
